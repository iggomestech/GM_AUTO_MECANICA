{% extends 'base.html' %}
{% block title %}{% if cliente %}Editar Cliente{% else %}Novo Cliente{% endif %} – GM Auto Mecânica{% endblock %}
{% block content %}
<h1 class="page-title">{% if cliente %}Editar Cliente{% else %}Novo Cliente{% endif %}</h1>

<form method="post" class="form-card">
  <div class="form-group">
    <label for="nome">Nome *</label>
    <input type="text" id="nome" name="nome" class="input" required
           value="{{ cliente.nome if cliente else '' }}">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="cpf_cnpj">CPF / CNPJ *</label>
      <input type="text" id="cpf_cnpj" name="cpf_cnpj" class="input" required
             value="{{ cliente.cpf_cnpj if cliente else '' }}">
    </div>
    <div class="form-group">
      <label for="telefone">Telefone *</label>
      <input type="text" id="telefone" name="telefone" class="input" required
             value="{{ cliente.telefone if cliente else '' }}">
    </div>
  </div>
  <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" class="input"
           value="{{ cliente.email if cliente else '' }}">
  </div>
  <div class="form-group">
    <label for="endereco">Endereço</label>
    <input type="text" id="endereco" name="endereco" class="input"
           value="{{ cliente.endereco if cliente else '' }}">
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{{ url_for('clientes.listar') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
